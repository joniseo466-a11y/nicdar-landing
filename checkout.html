<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>NicDar - Redirigiendo al pago</title>
  <meta name="robots" content="noindex">
  <script>(function(w,r){w._rwq=r;w[r]=w[r]||function(){(w[r].q=w[r].q||[]).push(arguments)}})(window,'rewardful');</script>
  <script async src="https://r.wdfl.co/rw.js" data-rewardful="456e0d"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    h2 { margin-bottom: 10px; }
    p { color: #aaa; }
    .spinner {
      border: 3px solid #333;
      border-top: 3px solid #fff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h2>Redirigiendo al pago...</h2>
  <p>Un momento, por favor.</p>

  <script>
    async function startCheckout() {
      const params = new URLSearchParams(window.location.search);
      const email = params.get('email');
      const plan = params.get('plan') || 'pro';

      if (!email) {
        document.body.innerHTML = '<h2>Error</h2><p>Falta el email. Abre esta página desde la extensión.</p>';
        return;
      }

      let referral = null;
      if (window.Rewardful && window.Rewardful.referral) {
        referral = window.Rewardful.referral;
      }

      try {
        const res = await fetch('https://amusing-courtesy-production.up.railway.app/create-checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, plan, referral })
        });
        const data = await res.json();
        if (data.url) {
          window.location.href = data.url;
        } else {
          document.body.innerHTML = '<h2>Error</h2><p>No se pudo iniciar el pago. Inténtalo de nuevo.</p>';
        }
      } catch (e) {
        document.body.innerHTML = '<h2>Error</h2><p>Problema de conexión. Revisa tu internet.</p>';
      }
    }

    setTimeout(startCheckout, 1500);
  </script>
</body>
</html>
